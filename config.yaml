# Search Agent 配置文件

# ============================================
# Tavily API 配置（用于搜索和网页抽取）
# ============================================
tavily:
  api_key: "tvly-dev-xxxxx"  # 替换为你的 Tavily API 密钥

# ============================================
# Agent 配置
# ============================================
agent:
  # 模型名称
  model: "gpt-4o"
  # API 基础 URL
  base_url: "https://api.openai.com/v1"
  # API 密钥
  api_key: "your-api-key"  # 替换为你的 API 密钥
  # 温度参数（0-1，越低越确定）
  temperature: 0.0
  # 最大迭代次数
  max_iterations: 10

# ============================================
# Visit 工具配置（用于访问网页并总结）
# ============================================
visit:
  # 用于总结网页内容的模型配置
  model: "gpt-3.5-turbo"
  base_url: "https://api.openai.com/v1"
  api_key: "your-api-key"  # 替换为你的 API 密钥
  temperature: 0.0

# ============================================
# 其他配置
# ============================================
# 是否打印详细日志
verbose: true
# 请求超时时间（秒）
timeout: 120
